name: Build ZN-M2 Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'target/linux/qualcommax/files/arch/arm64/boot/dts/qcom/ipq6018-zn-m2.dts'
      - 'target/linux/qualcommax/image/ipq60xx.mk'
      - '.github/workflows/build-zn-m2-only.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 180

    steps:
      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          submodules: 'recursive'

      - name: зі»з»ҹзҺҜеўғеҮҶеӨҮ
        run: |
          free -h
          df -h
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: й…ҚзҪ®дҫқиө–пјҲдҝ®еӨҚдҫқиө–зјәеӨұпјү
        run: |
          # дҝқз•ҷе®ҳж–№жәҗпјҢзЎ®дҝқдҫқиө–е®Ңж•ҙ
          echo "src-git packages https://git.openwrt.org/feed/packages.git" > feeds.conf.default
          echo "src-git luci https://git.openwrt.org/project/luci.git" >> feeds.conf.default
          echo "src-git routing https://git.openwrt.org/feed/routing.git" >> feeds.conf.default
          
          ./scripts/feeds clean > /dev/null 2>&1
          ./scripts/feeds update -f -a > /dev/null 2>&1
          
          # е…ій”®дҝ®еӨҚпјҡд»…еҲ йҷӨзңҹжӯЈеҶІзӘҒзҡ„еҢ…пјҢдҝқз•ҷеҹәзЎҖдҫқиө–пјҲеҰӮbusyboxпјү
          rm -rf package/utils/audit \
                 package/network/services/lldpd \
                 package/utils/policycoreutils  # еҸӘеҲ йҷӨжҳҺзЎ®еҶІзӘҒзҡ„еҢ…пјҢдёҚеҲ busybox
          
          # зЎ®дҝқеҹәзЎҖдҫқиө–еҢ…еӯҳеңЁпјҲbusyboxжҳҜж ёеҝғе·Ҙе…·пјҢдёҚиғҪеҲ йҷӨпјү
          if [ ! -d "package/utils/busybox" ]; then
            echo "жҒўеӨҚbusyboxеҢ…"
            git clone --quiet https://git.openwrt.org/project/busybox.git package/utils/busybox
          fi
          
          # е…ӢйҡҶpackagesжәҗиЎҘе……дҫқиө–
          [ ! -d "package/feeds/packages" ] && git clone --quiet https://git.openwrt.org/feed/packages.git package/feeds/packages
          
          # жҸҗеҸ–жүҖйңҖдҫқиө–еә“пјҲеҢ…жӢ¬зјәеӨұзҡ„libpciзӯүпјү
          XZ_SOURCE=$(find package/feeds/packages -path "*/xz" | head -n 1)
          [ -n "$XZ_SOURCE" ] && [ ! -d "package/libs/xz" ] && mv "$XZ_SOURCE" package/libs/
          
          # иЎҘе……net-snmpдҫқиө–зҡ„libpci
          LIBPCI_SOURCE=$(find package/feeds/packages -path "*/libpci" | head -n 1)
          [ -n "$LIBPCI_SOURCE" ] && [ ! -d "package/libs/libpci" ] && mv "$LIBPCI_SOURCE" package/libs/
          
          # иЎҘе……libauditпјҲи§ЈеҶіlibsemanageдҫқиө–пјү
          LIBAUDIT_SOURCE=$(find package/feeds/packages -path "*/libaudit" | head -n 1)
          [ -n "$LIBAUDIT_SOURCE" ] && [ ! -d "package/libs/libaudit" ] && mv "$LIBAUDIT_SOURCE" package/libs/
          
          # е…¶д»–еҝ…иҰҒдҫқиө–
          for lib in libev libpam libtirpc; do
            src=$(find package/feeds/packages -path "*/$lib" | head -n 1)
            [ -n "$src" ] && [ ! -d "package/libs/$lib" ] && mv "$src" package/libs/
          done
          
          # еӨ„зҗҶnet-snmp
          src=$(find package/feeds/packages -path "*/net-snmp" | head -n 1)
          [ -n "$src" ] && [ ! -d "package/libs/net-snmp" ] && mv "$src" package/libs/
          
          # жё…зҗҶдёҙж—¶ж–Үд»¶
          rm -rf package/feeds/packages
          
          # жҳҫејҸе®үиЈ…зјәеӨұзҡ„дҫқиө–еҢ…
          ./scripts/feeds install -a > /dev/null 2>&1
          ./scripts/feeds install busybox libaudit libpci policycoreutils  # ејәеҲ¶е®үиЈ…е…ій”®дҫқиө–

      - name: дҝ®еӨҚи®ҫеӨҮж ‘
        run: |
          DTSI_FILE="target/linux/qualcommax/files/arch/arm64/boot/dts/qcom/ipq6000-cmiot.dtsi"
          [ -f "$DTSI_FILE" ] && sed -i 's/#include "ipq6018-nss.dtsi"/\/\/&/' "$DTSI_FILE"

      - name: з”ҹжҲҗй…ҚзҪ®пјҲеҢ…еҗ«зјәеӨұдҫқиө–пјү
        run: |
          make distclean > /dev/null 2>&1
          cat > .config <<EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_zn-m2=y
          CONFIG_PACKAGE_ath11k-firmware-ipq6018=y
          # жҳҫејҸеҗҜз”ЁзјәеӨұзҡ„дҫқиө–еҢ…
          CONFIG_PACKAGE_busybox=y
          CONFIG_PACKAGE_libaudit=y
          CONFIG_PACKAGE_libpci=y
          CONFIG_PACKAGE_policycoreutils=y
          # еҺҹжңүдҫқиө–
          CONFIG_PACKAGE_libev=y
          CONFIG_PACKAGE_libpam=y
          CONFIG_PACKAGE_libtirpc=y
          CONFIG_PACKAGE_xz=y
          CONFIG_PACKAGE_net-snmp=y
          EOF
          make defconfig > /dev/null 2>&1

      - name: зј–иҜ‘е·Ҙе…·й“ҫ
        run: |
          make -j1 toolchain/compile V=0 2> toolchain-errors.log
          if [ -s toolchain-errors.log ]; then
            echo "е·Ҙе…·й“ҫзј–иҜ‘й”ҷиҜҜпјҡ"
            cat toolchain-errors.log
            exit 1
          fi

      - name: еҠЁжҖҒжҹҘжүҫе·Ҙе…·й“ҫзӣ®еҪ•е№¶йӘҢиҜҒзј–иҜ‘еҷЁ
        run: |
          TOOLCHAIN_DIR=$(find staging_dir/ -maxdepth 1 -type d -name "toolchain-aarch64_cortex-a53_*_musl" | head -n 1)
          
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "й”ҷиҜҜпјҡжңӘжүҫеҲ°е·Ҙе…·й“ҫзӣ®еҪ•"
            ls -lh staging_dir/
            exit 1
          fi
          
          echo "жүҫеҲ°е·Ҙе…·й“ҫзӣ®еҪ•пјҡ$TOOLCHAIN_DIR"
          TOOLCHAIN_BIN="$TOOLCHAIN_DIR/bin"
          
          if [ ! -d "$TOOLCHAIN_BIN" ]; then
            echo "й”ҷиҜҜпјҡе·Ҙе…·й“ҫдәҢиҝӣеҲ¶зӣ®еҪ•зјәеӨұ"
            ls -lh "$TOOLCHAIN_DIR"
            exit 1
          fi
          
          COMPILER="$TOOLCHAIN_BIN/aarch64-openwrt-linux-musl-gcc"
          if [ ! -f "$COMPILER" ]; then
            echo "й”ҷиҜҜпјҡдәӨеҸүзј–иҜ‘еҷЁзјәеӨұ"
            ls -lh "$TOOLCHAIN_BIN"
            exit 1
          fi
          
          $COMPILER --version || exit 1

      - name: зј–иҜ‘еӣәд»¶
        run: |
          make -j2 V=0 2> firmware-errors.log
          if [ -s firmware-errors.log ]; then
            echo "еӣәд»¶зј–иҜ‘й”ҷиҜҜпјҡ"
            cat firmware-errors.log
            exit 1
          fi

      - name: жЈҖжҹҘдә§зү©
        run: |
          FIRMWARE_DIR="bin/targets/qualcommax/ipq60xx"
          if ls $FIRMWARE_DIR/*zn_zn-m2*.bin >/dev/null 2>&1; then
            echo "еӣәд»¶зј–иҜ‘жҲҗеҠҹпјҒ"
            ls -lh $FIRMWARE_DIR/*zn_zn-m2*.bin
          else
            echo "жңӘжүҫеҲ°еӣәд»¶ж–Үд»¶"
            exit 1
          fi

      - name: дёҠдј еӣәд»¶
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zn-m2-${{ github.run_id }}
          files: bin/targets/qualcommax/ipq60xx/*zn_zn-m2*.bin

      - name: дёҠдј й”ҷиҜҜж—Ҙеҝ—пјҲд»…еӨұиҙҘж—¶пјү
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            toolchain-errors.log
            firmware-errors.log
          retention-days: 14
